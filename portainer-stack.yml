version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexusnv-web:latest
    container_name: nexusnv-web
    ports:
      - '127.0.0.1:51742:3000'
    environment:
      - PORT=3000
    restart: always
    deploy:
      restart_policy:
        condition: any
